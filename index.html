<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>お絵描き参加ページ</title><link rel="stylesheet" href="style.css"></head>
<body><main class="wrap"><section class="card stack"><div class="head"><div><h2 style="margin:0">🎨 お絵描き参加ページ</h2><div class="small">名前を入力して参加します</div></div><div id="status" class="status">接続確認中</div></div>
<div id="joinBox" class="stack"><div class="row"><label>部屋ID <input id="room" value="abo-room" maxlength="30"></label></div><label>名前<br><input id="name" maxlength="20" placeholder="表示する名前" style="width:100%"></label><button id="joinBtn" type="button">参加する</button><div class="small">空いている枠へ自動で入ります。最大4人です。</div></div>
<div id="drawBox" class="stack" hidden><div class="row"><strong id="meLabel"></strong><span class="small" id="slotLabel"></span><button id="leaveBtn" class="secondary" style="margin-left:auto">退出</button></div><div class="canvas-shell"><canvas id="canvas" width="1280" height="720"></canvas></div>
<div class="toolbar"><div class="tool"><strong>ペン色</strong><div class="colors" id="colors"><button class="color active" data-color="#111111" style="background:#111"></button><button class="color" data-color="#e53935" style="background:#e53935"></button><button class="color" data-color="#1e88e5" style="background:#1e88e5"></button><button class="color" data-color="#43a047" style="background:#43a047"></button><button class="color" data-color="#f9a825" style="background:#f9a825"></button><button class="color" data-color="#8e24aa" style="background:#8e24aa"></button></div></div>
<div class="tool"><label><strong>線の太さ：<span id="sizeValue">10</span></strong><br><input id="size" type="range" min="2" max="40" value="10" style="width:100%"></label></div><div class="tool row"><button id="eraserBtn" class="secondary">消しゴム</button><button id="clearBtn" class="danger">自分の絵を全消し</button></div></div></div></section></main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="firebase-config.js"></script>
<script>
(()=>{const $=id=>document.getElementById(id),canvas=$("canvas"),ctx=canvas.getContext("2d");let db,roomId="",slotId="";
function makeParticipantId(){
  if(window.crypto && typeof window.crypto.randomUUID==="function") return window.crypto.randomUUID();
  return "p-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2);
}
let participantId=localStorage.getItem("oekakiParticipantId")||makeParticipantId();localStorage.setItem("oekakiParticipantId",participantId);let strokesRef=null,clearVersionRef=null,drawing=false,last=null,color="#111111",size=10,eraser=false,pendingPoints=[],flushTimer=null,currentClearVersion=0,clearing=false;const SEND_INTERVAL=50;
function status(t,ok=false){$("status").textContent=t;$("status").className="status "+(ok?"ok":"")}function clean(v){return(v||"abo-room").trim().replace(/[.#$\[\]\/]/g,"-").slice(0,30)}
function init(){if(!window.FIREBASE_CONFIG){status("Firebase設定エラー");return false}if(!firebase.apps.length)firebase.initializeApp(window.FIREBASE_CONFIG);db=firebase.database();status("接続できます",true);return true}
function clearCanvas(){ctx.fillStyle="#fff";ctx.fillRect(0,0,canvas.width,canvas.height)}
function drawStroke(s){
 if(!s)return;
 ctx.save();ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=s.eraser?"#fff":s.color;ctx.lineWidth=s.size;ctx.beginPath();
 if(Array.isArray(s.points)&&s.points.length>=2){
  ctx.moveTo(s.points[0].x,s.points[0].y);
  for(let i=1;i<s.points.length;i++)ctx.lineTo(s.points[i].x,s.points[i].y);
 }else{
  ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);
 }
 ctx.stroke();ctx.restore();
}
function flushPending(){
 if(!strokesRef||pendingPoints.length<2){pendingPoints=[];return}
 const packet={points:pendingPoints.slice(),color,size,eraser,clientId:participantId,clearVersion:currentClearVersion,t:firebase.database.ServerValue.TIMESTAMP};
 pendingPoints=[pendingPoints[pendingPoints.length-1]];
 strokesRef.push(packet);
}
function scheduleFlush(){
 if(flushTimer)return;
 flushTimer=setTimeout(()=>{flushTimer=null;flushPending()},SEND_INTERVAL);
}
function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*canvas.width/r.width,y:(e.clientY-r.top)*canvas.height/r.height}}
async function join(){
 const joinBtn=$("joinBtn");
 if(!db){alert("Firebaseへの接続が完了していません。少し待ってから再度お試しください。");return}
 roomId=clean($("room").value);$("room").value=roomId;
 const name=$("name").value.trim();
 if(!name){alert("名前を入力してください");$("name").focus();return}
 joinBtn.disabled=true;joinBtn.textContent="参加処理中…";
 try{
  const ss=await db.ref(`drawingRooms/${roomId}/settings/layout`).once("value");
  const rawLayout=Number(ss.val()||4);
  const layout=[1,2,4].includes(rawLayout)?rawLayout:4;
  let claimed=null;
  for(let i=1;i<=layout;i++){
   const ref=db.ref(`drawingRooms/${roomId}/participants/slot${i}`);
   const result=await ref.transaction(cur=>{
    if(cur===null || cur.participantId===participantId){
     return {participantId,name,prompt:"",joinedAt:firebase.database.ServerValue.TIMESTAMP};
    }
    return;
   });
   if(result.committed){claimed=`slot${i}`;break}
  }
  if(!claimed){alert("参加枠がいっぱいです");return}
  slotId=claimed;
  localStorage.setItem("oekakiRoom",roomId);
  localStorage.setItem("oekakiSlot",slotId);
  await db.ref(`drawingRooms/${roomId}/participants/${slotId}/online`).set(true);
  db.ref(`drawingRooms/${roomId}/participants/${slotId}/online`).onDisconnect().set(false);
  enter(name,"");
 }catch(err){
  console.error(err);
  alert("参加処理でエラーが発生しました。Firebaseの接続とルールを確認してください。");
 }finally{
  joinBtn.disabled=false;joinBtn.textContent="参加する";
 }
}
function cancelPendingDrawing(){drawing=false;last=null;pendingPoints=[];if(flushTimer){clearTimeout(flushTimer);flushTimer=null}}
function enter(name,prompt){
 $("joinBox").hidden=true;$("drawBox").hidden=false;$("meLabel").textContent=prompt?`${name}｜お題：${prompt}`:name;$("slotLabel").textContent=slotId;clearCanvas();
 strokesRef=db.ref(`drawingRooms/${roomId}/participants/${slotId}/strokes`);
 clearVersionRef=db.ref(`drawingRooms/${roomId}/participants/${slotId}/clearVersion`);
 strokesRef.off();clearVersionRef.off();
 strokesRef.on("child_added",s=>{const v=s.val();if(v&&v.clientId!==participantId)drawStroke(v)});
 clearVersionRef.on("value",s=>{
  const next=Number(s.val()||0);
  if(next!==currentClearVersion){currentClearVersion=next;cancelPendingDrawing();clearCanvas()}
 })
}
async function restore(){roomId=localStorage.getItem("oekakiRoom");slotId=localStorage.getItem("oekakiSlot");if(!roomId||!slotId)return;const s=await db.ref(`drawingRooms/${roomId}/participants/${slotId}`).once("value"),p=s.val();if(p&&p.participantId===participantId){$("room").value=roomId;enter(p.name,p.prompt)}}
async function leave(){if(roomId&&slotId)await db.ref(`drawingRooms/${roomId}/participants/${slotId}`).remove();localStorage.removeItem("oekakiRoom");localStorage.removeItem("oekakiSlot");location.reload()}
canvas.addEventListener("pointerdown",e=>{if(!strokesRef||clearing)return;drawing=true;canvas.setPointerCapture(e.pointerId);last=pos(e);pendingPoints=[last]});
canvas.addEventListener("pointermove",e=>{if(!drawing||!strokesRef)return;const p=pos(e),s={x1:last.x,y1:last.y,x2:p.x,y2:p.y,color,size,eraser};drawStroke(s);pendingPoints.push(p);scheduleFlush();last=p});
["pointerup","pointercancel"].forEach(ev=>canvas.addEventListener(ev,()=>{if(drawing)flushPending();drawing=false;last=null;pendingPoints=[];if(flushTimer){clearTimeout(flushTimer);flushTimer=null}}));
$("colors").addEventListener("click",e=>{const b=e.target.closest("[data-color]");if(!b)return;color=b.dataset.color;eraser=false;$("eraserBtn").textContent="消しゴム";document.querySelectorAll(".color").forEach(x=>x.classList.toggle("active",x===b))});$("size").addEventListener("input",()=>{size=+$("size").value;$("sizeValue").textContent=size});$("eraserBtn").onclick=()=>{eraser=!eraser;$("eraserBtn").textContent=eraser?"消しゴム ON":"消しゴム"};$("clearBtn").onclick=async()=>{
 if(!confirm("自分の絵を全部消しますか？"))return;
 clearing=true;cancelPendingDrawing();clearCanvas();
 const base=db.ref(`drawingRooms/${roomId}/participants/${slotId}`);
 try{
  const tx=await base.child("clearVersion").transaction(v=>(Number(v)||0)+1);
  currentClearVersion=Number(tx.snapshot.val()||currentClearVersion+1);
  await base.child("strokes").remove();
  await base.child("clearAt").set(firebase.database.ServerValue.TIMESTAMP);
 }finally{clearing=false}
};$("joinBtn").onclick=join;$("leaveBtn").onclick=leave;
const q=new URLSearchParams(location.search);if(q.get("room"))$("room").value=q.get("room");clearCanvas();if(init())restore()})();
</script></body></html>
