<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>お絵描き管理ページ</title><link rel="stylesheet" href="style.css"></head>
<body><main class="wrap"><section class="card stack"><div class="head"><div><h2 style="margin:0">🎮 お絵描き管理ページ</h2><div class="small">参加人数・参加者・キャンバスを管理します</div></div><div id="status" class="status">接続確認中</div></div>
<div class="row"><label>部屋ID <input id="room" value="abo-room" maxlength="30"></label><button id="connectBtn">接続</button></div>
<div class="tool"><strong>表示・参加人数</strong><div class="row" style="margin-top:8px"><button data-layout="1" class="secondary">1人</button><button data-layout="2" class="secondary">2人</button><button data-layout="4">4人</button></div></div>
<div><h3>参加者一覧</h3><div id="participants" class="participants"></div></div>
<div class="row"><button id="clearAll" class="danger">全員の絵を全消し</button><button id="resetAll" class="danger">部屋を全部リセット</button></div>
<div class="small">参加URL：<code id="joinUrl"></code><br>OBS URL：<code id="obsUrl"></code></div></section></main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="firebase-config.js"></script>
<script>
(()=>{const $=id=>document.getElementById(id);let db,roomId="",participantsRef=null;function status(t,ok=false){$("status").textContent=t;$("status").className="status "+(ok?"ok":"")}function clean(v){return(v||"abo-room").trim().replace(/[.#$\[\]\/]/g,"-").slice(0,30)}
function init(){if(!firebase.apps.length)firebase.initializeApp(window.FIREBASE_CONFIG);db=firebase.database()}
function urls(){const base=location.href.replace(/admin\.html.*$/,"");$("joinUrl").textContent=`${base}index.html?room=${roomId}`;$("obsUrl").textContent=`${base}obs.html?room=${roomId}`}
function connect(){roomId=clean($("room").value);$("room").value=roomId;history.replaceState(null,"",`?room=${encodeURIComponent(roomId)}`);urls();if(participantsRef)participantsRef.off();participantsRef=db.ref(`drawingRooms/${roomId}/participants`);participantsRef.on("value",render);db.ref(`drawingRooms/${roomId}/settings/layout`).once("value").then(s=>{if(!s.exists())db.ref(`drawingRooms/${roomId}/settings/layout`).set(4)});status(`接続中：${roomId}`,true)}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function render(s){const data=s.val()||{};$("participants").innerHTML="";for(let i=1;i<=4;i++){const id=`slot${i}`,p=data[id],el=document.createElement("div");el.className="person";el.innerHTML=p?`<div><strong>${i}. ${esc(p.name||"")}</strong><div class="small">お題：${esc(p.prompt||"")}</div></div><div class="row"><button class="secondary clear" data-slot="${id}">絵を消す</button><button class="danger remove" data-slot="${id}">退出させる</button></div>`:`<div><strong>${i}. 空き</strong></div>`;$("participants").appendChild(el)}}
document.addEventListener("click",async e=>{const l=e.target.closest("[data-layout]");if(l){const n=+l.dataset.layout;await db.ref(`drawingRooms/${roomId}/settings/layout`).set(n);document.querySelectorAll("[data-layout]").forEach(b=>b.classList.toggle("secondary",b!==l));return}const c=e.target.closest(".clear");if(c){const r=db.ref(`drawingRooms/${roomId}/participants/${c.dataset.slot}`);await r.child("strokes").remove();await r.child("clearAt").set(firebase.database.ServerValue.TIMESTAMP);return}const x=e.target.closest(".remove");if(x&&confirm("この参加者を退出させますか？"))await db.ref(`drawingRooms/${roomId}/participants/${x.dataset.slot}`).remove()});
$("clearAll").onclick=async()=>{if(!confirm("全員の絵を消しますか？"))return;for(let i=1;i<=4;i++){const r=db.ref(`drawingRooms/${roomId}/participants/slot${i}`);await r.child("strokes").remove();await r.child("clearAt").set(firebase.database.ServerValue.TIMESTAMP)}};
$("resetAll").onclick=async()=>{if(confirm("参加者・絵・設定をすべてリセットしますか？")){await db.ref(`drawingRooms/${roomId}`).remove();await db.ref(`drawingRooms/${roomId}/settings/layout`).set(4)}};$("connectBtn").onclick=connect;init();const q=new URLSearchParams(location.search);if(q.get("room"))$("room").value=q.get("room");connect()})();
</script></body></html>
