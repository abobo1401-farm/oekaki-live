<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>お絵描き管理ページ</title><link rel="stylesheet" href="style.css"></head>
<body><main class="wrap"><section class="card stack"><div class="head"><div><h2 style="margin:0">🎮 お絵描き管理ページ</h2><div class="small">参加人数・参加者・キャンバスを管理します</div></div><div id="status" class="status">接続確認中</div></div>
<div class="row"><label>部屋ID <input id="room" value="abo-room" maxlength="30"></label><button id="connectBtn">接続</button></div>
<div class="tool"><strong>表示・参加人数</strong><div class="row" style="margin-top:8px"><button data-layout="1" class="secondary">1人</button><button data-layout="2" class="secondary">2人</button><button data-layout="4">4人</button><button id="normalView" class="secondary">通常表示に戻す</button></div></div>
<div class="tool"><strong>表示モード</strong><div class="row mode-row" style="margin-top:8px"><button id="modeGrid" data-mode="grid" class="secondary active">グリッド表示</button><button id="modeSynchro" data-mode="synchro" class="secondary">シンクロ表示（合体イラスト）</button><button id="modeShared" data-mode="shared" class="secondary">共有キャンバス（みんなで1枚）</button></div><div class="small">シンクロ表示中は、各参加者の「公開する」を押すごとにパーツが1枚の絵に重なって表示されます。目隠し中のパーツは合成されません。共有キャンバス中は、参加者全員が同じ1枚のキャンバスにリアルタイムで一緒に描き込めます。</div><div class="row" style="margin-top:10px"><button id="clearShared" class="danger">共有キャンバスを全消し</button><button id="saveImageBtn" class="secondary">🖼️ 画像を保存</button></div></div>
<div><h3>参加者一覧</h3><div id="participants" class="participants"></div></div>
<div class="row"><button id="clearAll" class="danger">全員の絵を全消し</button><button id="resetAll" class="danger">部屋を全部リセット</button></div>
<div class="small">参加URL：<code id="joinUrl"></code><br>OBS URL：<code id="obsUrl"></code></div></section></main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="firebase-config.js"></script>
<script>
(()=>{
const $=id=>document.getElementById(id);let db,roomId="",currentMode="grid";const slotListeners=new Map(),slotData={};let modeRef=null,modeHandler=null;
function status(t,ok=false){$("status").textContent=t;$("status").className="status "+(ok?"ok":"")}
function clean(v){return(v||"abo-room").trim().replace(/[.#$\[\]\/]/g,"-").slice(0,30)}
function init(){if(!firebase.apps.length)firebase.initializeApp(window.FIREBASE_CONFIG);db=firebase.database()}
function urls(){const base=location.href.replace(/admin\.html.*$/,'');$("joinUrl").textContent=`${base}index.html?room=${roomId}`;$("obsUrl").textContent=`${base}obs.html?room=${roomId}`}
function esc(v){return String(v||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function stopSlotListeners(){for(const items of slotListeners.values())for(const [ref,fn] of items)ref.off("value",fn);slotListeners.clear()}
function captureFocusedPartInput(){
 const a=document.activeElement;
 if(a&&a.classList&&a.classList.contains("part-input"))return{slot:a.dataset.slot,value:a.value,selStart:a.selectionStart,selEnd:a.selectionEnd};
 return null;
}
function restoreFocusedPartInput(captured){
 if(!captured)return;
 const el=document.querySelector(`.part-input[data-slot="${captured.slot}"]`);
 if(el){el.value=captured.value;el.focus();try{el.setSelectionRange(captured.selStart,captured.selEnd)}catch(e){}}
}
function render(){
 const captured=captureFocusedPartInput();
 $("participants").innerHTML="";
 for(let i=1;i<=4;i++){
  const id=`slot${i}`,p=slotData[id],occupied=Boolean(p&&p.participantId),el=document.createElement("div");el.className="person";
  const hidden=p?.hidden!==false;
  el.innerHTML=occupied?`<div class="person-main zoom" data-slot="${id}" title="クリックでアップ表示"><strong>${i}. ${esc(p.name)}</strong><span class="visibility-state ${hidden?'is-hidden':'is-public'}">${hidden?'🙈 目隠し中':'👀 公開中'}</span></div><label class="small" style="display:block">パーツ名（シンクロ表示用）<input class="part-input" data-slot="${id}" value="${esc(p.part||'')}" placeholder="例：胴体・手足・顔" maxlength="20"></label><div class="row"><button class="${hidden?'':'secondary'} visibility" data-slot="${id}" data-hidden="${hidden?'false':'true'}">${hidden?'公開する':'目隠しする'}</button><button class="secondary zoom" data-slot="${id}">アップ表示</button><button class="secondary clear" data-slot="${id}">絵を消す</button><button class="danger remove" data-slot="${id}">退出させる</button></div>`:`<div><strong>${i}. 空き</strong></div>`;
  $("participants").appendChild(el);
 }
 restoreFocusedPartInput(captured);
}
function watchSlot(id){
 const base=db.ref(`drawingRooms/${roomId}/participants/${id}`),items=[];slotData[id]={participantId:null,name:"",hidden:true,part:""};
 for(const key of ["participantId","name","hidden","part"]){
  const ref=base.child(key),fn=s=>{const value=s.val();slotData[id][key]=(key==="hidden")?(value!==false):(value||"");render()};ref.on("value",fn);items.push([ref,fn]);
 }
 slotListeners.set(id,items);
}
function connect(){
 roomId=clean($("room").value);$("room").value=roomId;history.replaceState(null,"",`?room=${encodeURIComponent(roomId)}`);urls();stopSlotListeners();
 for(let i=1;i<=4;i++)watchSlot(`slot${i}`);
 db.ref(`drawingRooms/${roomId}/settings/layout`).once("value").then(s=>{if(!s.exists())db.ref(`drawingRooms/${roomId}/settings/layout`).set(4)});
 if(modeRef&&modeHandler)modeRef.off("value",modeHandler);
 modeRef=db.ref(`drawingRooms/${roomId}/settings/mode`);
 modeRef.once("value").then(s=>{if(!s.exists())modeRef.set("grid")});
 modeHandler=s=>{const val=(s.val()==="synchro"||s.val()==="shared")?s.val():"grid";currentMode=val;document.querySelectorAll("[data-mode]").forEach(b=>b.classList.toggle("active",b.dataset.mode===val))};
 modeRef.on("value",modeHandler);
 status(`接続中：${roomId}`,true);render();
}
async function clearPath(ref){
 await ref.child("clearVersion").transaction(v=>(Number(v)||0)+1);
 await ref.child("strokes").remove();
 await ref.child("clearAt").set(firebase.database.ServerValue.TIMESTAMP);
}
async function clearSlot(slot){
 await clearPath(db.ref(`drawingRooms/${roomId}/participants/${slot}`));
}
async function clearShared(){
 await clearPath(db.ref(`drawingRooms/${roomId}/shared`));
}
function drawStrokeOnCtx(ctx,s){
 if(!s)return;
 ctx.save();ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=s.eraser?"#ffffff":(s.color||"#111111");ctx.lineWidth=Number(s.size||10);ctx.beginPath();
 if(Array.isArray(s.points)&&s.points.length>=2){
  ctx.moveTo(Number(s.points[0].x||0),Number(s.points[0].y||0));
  for(let i=1;i<s.points.length;i++)ctx.lineTo(Number(s.points[i].x||0),Number(s.points[i].y||0));
 }else{
  ctx.moveTo(Number(s.x1||0),Number(s.y1||0));ctx.lineTo(Number(s.x2||0),Number(s.y2||0));
 }
 ctx.stroke();ctx.restore();
}
async function buildExportCanvas(){
 const canvas=document.createElement("canvas");canvas.width=1280;canvas.height=720;
 const ctx=canvas.getContext("2d");ctx.fillStyle="#ffffff";ctx.fillRect(0,0,1280,720);
 if(currentMode==="shared"){
  const snap=await db.ref(`drawingRooms/${roomId}/shared/strokes`).once("value");
  Object.values(snap.val()||{}).forEach(s=>drawStrokeOnCtx(ctx,s));
  return canvas;
 }
 if(currentMode==="synchro"){
  // シンクロ表示中は「公開する」済み（hidden=false）のパーツだけを、スロット番号順（1が背面）に重ねる。
  for(let i=1;i<=4;i++){
   const slot=`slot${i}`,p=slotData[slot];
   if(!p||!p.participantId||p.hidden!==false)continue;
   const snap=await db.ref(`drawingRooms/${roomId}/participants/${slot}/strokes`).once("value");
   Object.values(snap.val()||{}).forEach(s=>drawStrokeOnCtx(ctx,s));
  }
  return canvas;
 }
 return null;
}
document.addEventListener("click",async e=>{
 const l=e.target.closest("[data-layout]");if(l){const n=+l.dataset.layout;await db.ref(`drawingRooms/${roomId}/settings/layout`).set(n);document.querySelectorAll("[data-layout]").forEach(b=>b.classList.toggle("secondary",b!==l));return}
 const md=e.target.closest("[data-mode]");if(md){await db.ref(`drawingRooms/${roomId}/settings/mode`).set(md.dataset.mode);return}
 const v=e.target.closest(".visibility");if(v){await db.ref(`drawingRooms/${roomId}/participants/${v.dataset.slot}/hidden`).set(v.dataset.hidden==="true");return}
 const z=e.target.closest(".zoom");if(z){await db.ref(`drawingRooms/${roomId}/settings/focusSlot`).set(z.dataset.slot);return}
 const c=e.target.closest(".clear");if(c){await clearSlot(c.dataset.slot);return}
 const x=e.target.closest(".remove");if(x&&confirm("この参加者を退出させますか？"))await db.ref(`drawingRooms/${roomId}/participants/${x.dataset.slot}`).remove();
});
document.addEventListener("change",e=>{
 const p=e.target.closest(".part-input");
 if(p)db.ref(`drawingRooms/${roomId}/participants/${p.dataset.slot}/part`).set(p.value.trim().slice(0,20));
});
document.addEventListener("keydown",e=>{
 if(e.target.classList&&e.target.classList.contains("part-input")&&e.key==="Enter"){e.preventDefault();e.target.blur()}
});
$("normalView").onclick=()=>db.ref(`drawingRooms/${roomId}/settings/focusSlot`).remove();
$("clearAll").onclick=async()=>{
 if(!confirm("全員の絵を消しますか？"))return;
 // 参加者がいない空きスロットにclearVersion/clearAtだけを書き込んでしまうと、
 // 後で参加しようとした時に「枠がいっぱいです」と誤判定される原因になるため、occupied分だけ対象にする。
 const occupied=[1,2,3,4].filter(i=>slotData[`slot${i}`]&&slotData[`slot${i}`].participantId);
 await Promise.all(occupied.map(i=>clearSlot(`slot${i}`)));
};
$("clearShared").onclick=async()=>{if(!confirm("共有キャンバスをみんな分まとめて消しますか？"))return;await clearShared()};
$("saveImageBtn").onclick=async()=>{
 if(currentMode==="grid"){alert("グリッド表示中は保存できません。シンクロ表示か共有キャンバスでお使いください。");return}
 const btn=$("saveImageBtn"),original=btn.textContent;btn.disabled=true;btn.textContent="保存中…";
 try{
  const canvas=await buildExportCanvas();
  if(!canvas)return;
  canvas.toBlob(blob=>{
   const url=URL.createObjectURL(blob),a=document.createElement("a");
   a.href=url;a.download=`oekaki-${currentMode}-${roomId}-${Date.now()}.png`;
   document.body.appendChild(a);a.click();a.remove();
   setTimeout(()=>URL.revokeObjectURL(url),1000);
  },"image/png");
 }finally{btn.disabled=false;btn.textContent=original}
};
$("resetAll").onclick=async()=>{if(confirm("参加者・絵・設定をすべてリセットしますか？")){await db.ref(`drawingRooms/${roomId}`).remove();await db.ref(`drawingRooms/${roomId}/settings/layout`).set(4);await db.ref(`drawingRooms/${roomId}/settings/mode`).set("grid")}};
$("connectBtn").onclick=connect;init();const q=new URLSearchParams(location.search);if(q.get("room"))$("room").value=q.get("room");connect();
})();
</script></body></html>
