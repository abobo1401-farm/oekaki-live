<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>お絵描き管理ページ</title><link rel="stylesheet" href="style.css">
<style>
/* 管理画面のボタンだけ、丸くてやわらかい見た目に変更 */
button{
  border:none;
  border-radius:999px;
  padding:12px 18px;
  font-weight:800;
  letter-spacing:.02em;
  box-shadow:0 5px 0 rgba(53,117,72,.20), 0 8px 18px rgba(53,117,72,.12);
  transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
}
button:hover{
  transform:translateY(-1px);
  filter:brightness(1.03);
  box-shadow:0 6px 0 rgba(53,117,72,.18), 0 10px 20px rgba(53,117,72,.14);
}
button:active{
  transform:translateY(3px);
  box-shadow:0 2px 0 rgba(53,117,72,.18), 0 4px 10px rgba(53,117,72,.10);
}
button.secondary{
  background:linear-gradient(180deg,#f7fbf7 0%,#e6f1e8 100%);
  color:#355d3f;
  border:2px solid #cfe3d3;
  box-shadow:0 5px 0 #c8ddcd, 0 8px 16px rgba(53,117,72,.08);
}
button.danger{
  background:linear-gradient(180deg,#ff8f9b 0%,#e96675 100%);
  color:#fff;
  box-shadow:0 5px 0 #c95462, 0 8px 16px rgba(201,84,98,.18);
}
#connectBtn{
  background:linear-gradient(180deg,#77c989 0%,#4d9160 100%);
}
[data-layout]{
  min-width:88px;
  position:relative;
}
[data-layout="1"]::before{content:"🍏 ";} 
[data-layout="2"]::before{content:"🍎🍏 ";font-size:.9em;}
[data-layout="4"]::before{content:"🍎🍏🍎🍏 ";font-size:.72em;}
.clear{
  background:linear-gradient(180deg,#ffd88a 0%,#f3b84f 100%) !important;
  color:#6b4a12 !important;
  box-shadow:0 5px 0 #d89b35, 0 8px 16px rgba(216,155,53,.16) !important;
}
.remove{
  background:linear-gradient(180deg,#ff9aa5 0%,#df6473 100%) !important;
}
#clearAll::before{content:"🧽 ";}
#resetAll::before{content:"🔄 ";}
#connectBtn::before{content:"🔗 ";}
.tool{
  border:2px solid #e1efe4;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9);
}
</style>

</head>
<body><main class="wrap"><section class="card stack"><div class="head"><div><h2 style="margin:0">🎮 お絵描き管理ページ</h2><div class="small">参加人数・名前表示・キャンバスを管理します</div></div><div id="status" class="status">接続確認中</div></div>
<div class="row"><label>部屋ID <input id="room" value="abo-room" maxlength="30"></label><button id="connectBtn">接続</button></div>
<div class="tool"><strong>表示・参加人数</strong><div class="row" style="margin-top:8px"><button data-layout="1" class="secondary">1人</button><button data-layout="2" class="secondary">2人</button><button data-layout="4">4人</button></div></div>
<div><h3>参加者一覧</h3><div id="participants" class="participants"></div></div>
<div class="row"><button id="clearAll" class="danger">全員の絵を全消し</button><button id="resetAll" class="danger">部屋を全部リセット</button></div>
<div class="small">参加URL：<code id="joinUrl"></code><br>OBS URL：<code id="obsUrl"></code></div></section></main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="firebase-config.js"></script>
<script>
(()=>{
const $=id=>document.getElementById(id);
let db,roomId="",participantsRef=null,layoutRef=null,currentLayout=4;

function status(t,ok=false){
  $("status").textContent=t;
  $("status").className="status "+(ok?"ok":"");
}
function clean(v){
  return(v||"abo-room").trim().replace(/[.#$\[\]\/]/g,"-").slice(0,30);
}
function init(){
  if(!firebase.apps.length)firebase.initializeApp(window.FIREBASE_CONFIG);
  db=firebase.database();
}
function urls(){
  const base=location.href.replace(/admin\.html.*$/,"");
  $("joinUrl").textContent=`${base}index.html?room=${roomId}`;
  $("obsUrl").textContent=`${base}obs.html?room=${roomId}`;
}
function updateLayoutButtons(){
  document.querySelectorAll("[data-layout]").forEach(button=>{
    const n=Number(button.dataset.layout);
    button.classList.toggle("secondary",n!==currentLayout);
  });
}
function connect(){
  roomId=clean($("room").value);
  $("room").value=roomId;
  history.replaceState(null,"",`?room=${encodeURIComponent(roomId)}`);
  urls();

  if(participantsRef)participantsRef.off();
  if(layoutRef)layoutRef.off();

  participantsRef=db.ref(`drawingRooms/${roomId}/participants`);
  layoutRef=db.ref(`drawingRooms/${roomId}/settings/layout`);

  participantsRef.on("value",render);
  layoutRef.on("value",snapshot=>{
    const value=Number(snapshot.val());
    currentLayout=[1,2,4].includes(value)?value:4;
    if(!snapshot.exists())layoutRef.set(4);
    updateLayoutButtons();
  });

  status(`接続中：${roomId}`,true);
}
function esc(s){
  return String(s).replace(/[&<>"']/g,m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
}
function render(s){
  const data=s.val()||{};
  $("participants").innerHTML="";
  for(let i=1;i<=4;i++){
    const id=`slot${i}`,p=data[id],el=document.createElement("div");
    el.className="person";
    el.innerHTML=p
      ?`<div><strong>${i}. ${esc(p.name||"")}</strong></div>
        <div class="row">
          <button class="secondary clear" data-slot="${id}">絵を消す</button>
          <button class="danger remove" data-slot="${id}">退出させる</button>
        </div>`
      :`<div><strong>${i}. 空き</strong></div>`;
    $("participants").appendChild(el);
  }
}

/* 人数ボタンだけ個別に確実に反応させる */
document.querySelectorAll("[data-layout]").forEach(button=>{
  button.addEventListener("click",async()=>{
    const n=Number(button.dataset.layout);
    try{
      await db.ref(`drawingRooms/${roomId}/settings/layout`).set(n);
    }catch(error){
      console.error(error);
      alert("人数の切り替えに失敗しました");
    }
  });
});

/* 参加者ごとの操作 */
document.addEventListener("click",async e=>{
  const c=e.target.closest(".clear");
  if(c){
    const r=db.ref(`drawingRooms/${roomId}/participants/${c.dataset.slot}`);
    await r.child("strokes").remove();
    await r.child("clearAt").set(firebase.database.ServerValue.TIMESTAMP);
    return;
  }

  const x=e.target.closest(".remove");
  if(x&&confirm("この参加者を退出させますか？")){
    await db.ref(`drawingRooms/${roomId}/participants/${x.dataset.slot}`).remove();
  }
});

$("clearAll").onclick=async()=>{
  if(!confirm("全員の絵を消しますか？"))return;
  for(let i=1;i<=4;i++){
    const r=db.ref(`drawingRooms/${roomId}/participants/slot${i}`);
    await r.child("strokes").remove();
    await r.child("clearAt").set(firebase.database.ServerValue.TIMESTAMP);
  }
};

$("resetAll").onclick=async()=>{
  if(confirm("参加者・絵・設定をすべてリセットしますか？")){
    await db.ref(`drawingRooms/${roomId}`).remove();
    await db.ref(`drawingRooms/${roomId}/settings/layout`).set(4);
  }
};

$("connectBtn").onclick=connect;

init();
const q=new URLSearchParams(location.search);
if(q.get("room"))$("room").value=q.get("room");
connect();
})();
</script></body></html>
