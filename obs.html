<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OBS お絵描き表示</title><link rel="stylesheet" href="style.css"></head><body class="obs-body"><div id="grid" class="obs-grid layout-4"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="firebase-config.js"></script>
<script>
(()=>{if(!firebase.apps.length)firebase.initializeApp(window.FIREBASE_CONFIG);const db=firebase.database(),grid=document.getElementById("grid"),room=(new URLSearchParams(location.search).get("room")||"abo-room").replace(/[.#$\[\]\/]/g,"-").slice(0,30);let layout=4,people={};const listeners=new Map();
function draw(ctx,s){ctx.save();ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=s.eraser?"#fff":s.color;ctx.lineWidth=s.size;ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();ctx.restore()}function clear(ctx,c){ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height)}
function attach(slot,c){const key=`${room}/${slot}`,ctx=c.getContext("2d");clear(ctx,c);if(listeners.has(key))listeners.get(key).forEach(([r,e,f])=>r.off(e,f));const arr=[],sr=db.ref(`drawingRooms/${room}/participants/${slot}/strokes`),cr=db.ref(`drawingRooms/${room}/participants/${slot}/clearAt`),a=s=>{if(s.val())draw(ctx,s.val())},b=s=>{if(s.exists())clear(ctx,c)};sr.on("child_added",a);cr.on("value",b);arr.push([sr,"child_added",a],[cr,"value",b]);listeners.set(key,arr)}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function render(){grid.className=`obs-grid layout-${layout}`;grid.innerHTML="";for(let i=1;i<=layout;i++){const slot=`slot${i}`,p=people[slot],box=document.createElement("div");box.className="obs-slot";if(!p)box.innerHTML=`<div class="empty">参加待ち</div>`;else{box.innerHTML=`<canvas width="1280" height="720"></canvas><div class="obs-meta"><span class="badge">${esc(p.name||"")}</span>${p.prompt?`<span class="badge">お題：${esc(p.prompt)}</span>`:""}</div>`;attach(slot,box.querySelector("canvas"))}grid.appendChild(box)}}
db.ref(`drawingRooms/${room}/settings/layout`).on("value",s=>{layout=[1,2,4].includes(+s.val())?+s.val():4;render()});db.ref(`drawingRooms/${room}/participants`).on("value",s=>{people=s.val()||{};render()})})();
</script></body></html>
