<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OBS お絵描き表示</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="obs-body">
<div id="grid" class="obs-grid layout-4"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
(()=>{
  if(!firebase.apps.length) firebase.initializeApp(window.FIREBASE_CONFIG);

  const db = firebase.database();
  const grid = document.getElementById("grid");
  const room = (new URLSearchParams(location.search).get("room") || "abo-room")
    .replace(/[.#$\[\]\/]/g,"-")
    .slice(0,30);

  let layout = 4;
  let focusSlot = null;
  let mode = "grid";
  let showNames = true;
  const slotStates = new Map();
  const slotListeners = new Map();
  let synchro = null; // holds per-slot offscreen state + listeners while mode==="synchro"
  let shared = null;  // holds listeners while mode==="shared"

  function escapeHtml(value){
    return String(value ?? "").replace(/[&<>"']/g, char => ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#39;"
    }[char]));
  }

  // 見た目上の「枠」(border/box-shadow)はCSSで維持しつつ、canvas自体の背景は透明にする。
  // OBSの合成先(配信画面など)が透けて見えるようにするため。
  function clearTransparent(ctx, canvas){
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }

  function drawStroke(ctx, stroke){
    if(!stroke) return;
    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    if(stroke.eraser){
      // canvas背景が透明なため、白を塗るのではなく実際にピクセルを消して透明に戻す。
      ctx.globalCompositeOperation = "destination-out";
      ctx.strokeStyle = "#000000";
    }else{
      ctx.strokeStyle = stroke.color || "#111111";
    }
    ctx.lineWidth = Number(stroke.size || 10);
    ctx.beginPath();
    if(Array.isArray(stroke.points) && stroke.points.length >= 2){
      ctx.moveTo(Number(stroke.points[0].x || 0), Number(stroke.points[0].y || 0));
      for(let i=1;i<stroke.points.length;i++){
        ctx.lineTo(Number(stroke.points[i].x || 0), Number(stroke.points[i].y || 0));
      }
    }else{
      ctx.moveTo(Number(stroke.x1 || 0), Number(stroke.y1 || 0));
      ctx.lineTo(Number(stroke.x2 || 0), Number(stroke.y2 || 0));
    }
    ctx.stroke();
    ctx.restore();
  }

  function removeSlotListeners(slot){
    const listeners = slotListeners.get(slot) || [];
    for(const [ref,event,handler] of listeners){
      ref.off(event,handler);
    }
    slotListeners.delete(slot);
  }

  function createSlot(slot, number){
    removeSlotListeners(slot);

    const box = document.createElement("div");
    box.className = "obs-slot";
    box.dataset.slot = slot;
    box.innerHTML = `
      <div class="obs-slot-label ${showNames ? "" : "is-off"}">
        <span class="badge name-badge" hidden></span>
        <span class="badge prompt-badge" hidden></span>
      </div>
      <div class="obs-slot-canvas">
        <canvas width="1080" height="1080"></canvas>
        <div class="blind-cover"><div><strong>🎨 お絵描き中</strong><span>公開までお待ちください</span></div></div>
        <div class="empty">参加待ち</div>
      </div>
    `;

    const canvas = box.querySelector("canvas");
    const ctx = canvas.getContext("2d");
    const label = box.querySelector(".obs-slot-label");
    const empty = box.querySelector(".empty");
    const nameBadge = box.querySelector(".name-badge");
    const promptBadge = box.querySelector(".prompt-badge");
    const blindCover = box.querySelector(".blind-cover");

    clearTransparent(ctx, canvas);

    const state = {
      box, canvas, ctx, label, empty, nameBadge, promptBadge, blindCover,
      participantId: null,
      name: "",
      prompt: "",
      hidden: true,
      clearVersion: 0,
      drawQueue: [],
      frameRequested: false
    };
    slotStates.set(slot,state);

    const base = db.ref(`drawingRooms/${room}/participants/${slot}`);
    const participantIdRef = base.child("participantId");
    const nameRef = base.child("name");
    const promptRef = base.child("prompt");
    const strokesRef = base.child("strokes");
    const clearVersionRef = base.child("clearVersion");
    const hiddenRef = base.child("hidden");

    const listeners = [];

    const updateVisibility = () => {
      const occupied = Boolean(state.participantId);
      state.canvas.style.display = occupied ? "block" : "none";
      state.nameBadge.hidden = !occupied;
      state.empty.style.display = occupied ? "none" : "grid";
      state.blindCover.style.display = occupied && state.hidden ? "grid" : "none";
    };

    const onParticipantId = snap => {
      const wasOccupied = Boolean(state.participantId);
      state.participantId = snap.val() || null;
      const isOccupied = Boolean(state.participantId);
      // 本当に誰かが退出して空きになった時だけキャンバスを消す。
      // participantId/hiddenの読み込み順序（どちらが先に届くか）に依存して
      // 「まだ読み込み中なだけ」を「空き」と誤判定し、絵を消してしまわないようにする。
      if(wasOccupied && !isOccupied){
        clearTransparent(state.ctx,state.canvas);
        state.nameBadge.textContent = "";
        state.promptBadge.textContent = "";
        state.promptBadge.hidden = true;
      }
      updateVisibility();
    };

    const onName = snap => {
      state.name = snap.val() || "";
      state.nameBadge.textContent = state.name || `${number}番`;
    };

    const onPrompt = snap => {
      state.prompt = snap.val() || "";
      state.promptBadge.textContent = state.prompt ? `お題：${state.prompt}` : "";
      state.promptBadge.hidden = !state.prompt;
    };

    const onHidden = snap => {
      state.hidden = snap.val() !== false;
      updateVisibility();
    };

    const flushDrawQueue = () => {
      state.frameRequested = false;
      const queue = state.drawQueue.splice(0);
      for(const stroke of queue){
        if(Number(stroke.clearVersion || 0) >= state.clearVersion){
          drawStroke(state.ctx,stroke);
        }
      }
    };

    const onStroke = snap => {
      const stroke = snap.val();
      // participantIdの読み込みタイミングに依存しないよう、ここでは弾かない。
      // 表示・非表示はupdateVisibility()側のCSS(canvas display)で制御される。
      if(!stroke) return;
      if(Number(stroke.clearVersion || 0) < state.clearVersion) return;
      state.drawQueue.push(stroke);
      if(!state.frameRequested){
        state.frameRequested = true;
        requestAnimationFrame(flushDrawQueue);
      }
    };

    const onClearVersion = snap => {
      const next = Number(snap.val() || 0);
      if(next !== state.clearVersion){
        state.clearVersion = next;
        state.drawQueue.length = 0;
        clearTransparent(state.ctx,state.canvas);
      }
    };

    // 誰かが線を「ひとつ戻る」等で削除した時は、1本だけ消すことができないので
    // 現在残っている線を全部読み直して描き直す。
    async function redrawFromScratch(){
      const snap = await strokesRef.once("value");
      const all = snap.val() || {};
      clearTransparent(state.ctx,state.canvas);
      Object.values(all).forEach(stroke => {
        if(Number(stroke && stroke.clearVersion || 0) >= state.clearVersion){
          drawStroke(state.ctx,stroke);
        }
      });
    }
    let redrawQueued = false;
    const onStrokeRemoved = () => {
      if(redrawQueued) return;
      redrawQueued = true;
      requestAnimationFrame(async () => { redrawQueued = false; await redrawFromScratch(); });
    };

    // 参加者情報・目隠し状態・clearVersionを先にまとめて確定させてから、
    // strokesのchild_addedリプレイを開始する。これにより「情報の読み込み順序」に
    // 依存する不整合そのものを起こりえなくする。
    (async () => {
      const [pidSnap, nameSnap, promptSnap, hiddenSnap, cvSnap] = await Promise.all([
        participantIdRef.once("value"),
        nameRef.once("value"),
        promptRef.once("value"),
        hiddenRef.once("value"),
        clearVersionRef.once("value")
      ]);
      if(slotStates.get(slot) !== state) return; // その間にteardownされていたら何もしない
      state.participantId = pidSnap.val() || null;
      state.name = nameSnap.val() || "";
      state.nameBadge.textContent = state.name || `${number}番`;
      state.prompt = promptSnap.val() || "";
      state.promptBadge.textContent = state.prompt ? `お題：${state.prompt}` : "";
      state.promptBadge.hidden = !state.prompt;
      state.hidden = hiddenSnap.val() !== false;
      state.clearVersion = Number(cvSnap.val() || 0);
      updateVisibility();

      participantIdRef.on("value",onParticipantId);
      nameRef.on("value",onName);
      promptRef.on("value",onPrompt);
      hiddenRef.on("value",onHidden);
      clearVersionRef.on("value",onClearVersion);
      strokesRef.on("child_added",onStroke);
      strokesRef.on("child_removed",onStrokeRemoved);

      listeners.push(
        [participantIdRef,"value",onParticipantId],
        [nameRef,"value",onName],
        [promptRef,"value",onPrompt],
        [strokesRef,"child_added",onStroke],
        [strokesRef,"child_removed",onStrokeRemoved],
        [clearVersionRef,"value",onClearVersion],
        [hiddenRef,"value",onHidden]
      );
      slotListeners.set(slot,listeners);
    })();
    return box;
  }

  function teardownGrid(){
    for(const slot of slotListeners.keys()){
      removeSlotListeners(slot);
    }
    slotStates.clear();
  }

  // グリッド(1人/2人/4人/5人)表示の各枠が正方形(1:1)を保ったまま最大サイズになるよう、
  // CSS Gridの1frによる引き伸ばしではなくJSでセルの実ピクセルサイズを計算する。
  // 名前ラベル分の高さ(labelH)も行の高さ予算から差し引く。
  function fitObsGrid(){
    if(grid.classList.contains("focus-mode")) return;
    if(mode !== "grid") return;
    const cols = layout === 5 ? 5 : (layout === 1 ? 1 : 2);
    const rows = layout === 4 ? 2 : 1;
    const gap = 12, pad = 12, labelH = showNames ? 32 : 0;
    const availW = Math.max(0, window.innerWidth - pad*2 - gap*(cols-1));
    const availH = Math.max(0, window.innerHeight - pad*2 - gap*(rows-1));
    let cellW = availW / cols;
    let cellH = cellW; // 正方形なので幅=高さ
    if((cellH + labelH) * rows > availH){
      cellH = Math.max(0, availH / rows - labelH);
      cellW = cellH;
    }
    grid.style.setProperty("--cell-w", cellW + "px");
    grid.style.setProperty("--cell-h", cellH + "px");
    grid.style.setProperty("--label-h", labelH + "px");
  }
  window.addEventListener("resize", fitObsGrid);

  // 名前表示のON/OFF設定を、既に描画済みの枠にも反映する（作り直し不要）。
  function applyShowNames(){
    document.querySelectorAll(".obs-slot-label").forEach(el => {
      el.classList.toggle("is-off", !showNames);
    });
    fitObsGrid();
  }

  // シンクロ/共有キャンバスの正方形キャンバスが、ステータスバッジ行を除いた
  // 残りスペースに収まる最大の正方形になるよう計算する。
  function fitSquareShell(){
    const wrap = grid.querySelector(".synchro-wrap");
    const shell = grid.querySelector(".synchro-canvas-shell");
    if(!wrap || !shell) return;
    const statusEl = grid.querySelector(".synchro-status");
    const wrapRect = wrap.getBoundingClientRect();
    const gap = 18;
    const statusH = statusEl ? statusEl.getBoundingClientRect().height : 0;
    const availW = wrapRect.width;
    const availH = wrapRect.height - statusH - (statusH > 0 ? gap : 0);
    const size = Math.max(0, Math.min(availW, availH));
    shell.style.setProperty("--shell-size", size + "px");
  }
  window.addEventListener("resize", fitSquareShell);

  function renderLayout(){
    if(mode !== "grid") return;
    teardownGrid();
    grid.innerHTML = "";
    const focused = focusSlot && /^slot[1-5]$/.test(focusSlot);
    grid.className = focused ? "obs-grid layout-1 focus-mode" : `obs-grid layout-${layout}`;

    if(focused){
      const number = Number(focusSlot.replace("slot",""));
      grid.appendChild(createSlot(focusSlot,number));
    }else{
      for(let i=1;i<=layout;i++){
        const slot = `slot${i}`;
        grid.appendChild(createSlot(slot,i));
      }
    }
    fitObsGrid();
  }

  // ---- シンクロ表示（合体イラスト）モード ----
  // 各スロットは見た目には表示されないオフスクリーンcanvasに今まで通り差分描画し、
  // 公開(hidden=false)になっているスロットだけを1枚の合成canvasへdrawImageで重ねる。
  function teardownSynchro(){
    if(!synchro) return;
    if(synchro.cancel) synchro.cancel();
    for(const [ref,event,handler] of synchro.listeners){
      ref.off(event,handler);
    }
    synchro = null;
  }

  function renderSynchro(){
    grid.innerHTML = `
      <div class="synchro-wrap">
        <div class="synchro-canvas-shell"><canvas width="1080" height="1080"></canvas></div>
        <div class="synchro-status"></div>
      </div>`;
    grid.className = "obs-grid mode-synchro";

    const canvas = grid.querySelector(".synchro-canvas-shell canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = grid.querySelector(".synchro-status");
    clearTransparent(ctx, canvas);
    fitSquareShell();

    const slots = [1,2,3,4,5].map(n => `slot${n}`);
    const states = {};
    const listeners = [];
    let compositeQueued = false;
    let cancelled = false;

    const queueComposite = () => {
      if(compositeQueued) return;
      compositeQueued = true;
      requestAnimationFrame(() => {
        compositeQueued = false;
        clearTransparent(ctx, canvas);
        for(const slot of slots){
          const s = states[slot];
          if(s && s.occupied && !s.hidden){
            ctx.drawImage(s.offCanvas, 0, 0);
          }
        }
      });
    };

    const updateStatus = () => {
      statusEl.innerHTML = slots.map(slot => {
        const s = states[slot];
        if(!s || !s.occupied) return "";
        const label = escapeHtml(s.part || s.name || slot);
        const revealed = !s.hidden;
        return `<div class="part-badge ${revealed ? "revealed" : "pending"}"><span class="dot"></span>${label}${revealed ? "" : "（準備中）"}</div>`;
      }).join("");
      fitSquareShell();
    };

    for(const slot of slots){
      const offCanvas = document.createElement("canvas");
      offCanvas.width = 1080; offCanvas.height = 1080;
      const offCtx = offCanvas.getContext("2d");
      clearTransparent(offCtx, offCanvas);

      const s = {
        occupied: false, hidden: true, name: "", part: "",
        clearVersion: 0, offCanvas, offCtx,
        drawQueue: [], frameRequested: false
      };
      states[slot] = s;

      const base = db.ref(`drawingRooms/${room}/participants/${slot}`);
      const participantIdRef = base.child("participantId");
      const nameRef = base.child("name");
      const partRef = base.child("part");
      const hiddenRef = base.child("hidden");
      const strokesRef = base.child("strokes");
      const clearVersionRef = base.child("clearVersion");

      const onParticipantId = snap => { s.occupied = Boolean(snap.val()); updateStatus(); queueComposite(); };
      const onName = snap => { s.name = snap.val() || ""; updateStatus(); };
      const onPart = snap => { s.part = snap.val() || ""; updateStatus(); };
      const onHidden = snap => { s.hidden = snap.val() !== false; updateStatus(); queueComposite(); };

      const flushOwnQueue = () => {
        s.frameRequested = false;
        const queue = s.drawQueue.splice(0);
        for(const stroke of queue){
          if(Number(stroke.clearVersion || 0) >= s.clearVersion){
            drawStroke(s.offCtx, stroke);
          }
        }
        if(!s.hidden) queueComposite();
      };

      const onStroke = snap => {
        const stroke = snap.val();
        // occupied判定の読み込みタイミングに依存しないよう、ここでは弾かない。
        // 表示するかどうかはqueueComposite()側でs.occupied/s.hiddenを見て毎回判定される。
        if(!stroke) return;
        if(Number(stroke.clearVersion || 0) < s.clearVersion) return;
        s.drawQueue.push(stroke);
        if(!s.frameRequested){
          s.frameRequested = true;
          requestAnimationFrame(flushOwnQueue);
        }
      };

      const onClearVersion = snap => {
        const next = Number(snap.val() || 0);
        if(next !== s.clearVersion){
          s.clearVersion = next;
          s.drawQueue.length = 0;
          clearTransparent(s.offCtx, offCanvas);
          queueComposite();
        }
      };

      // 誰かが線を「ひとつ戻る」等で削除した時は、そのスロットのオフスクリーンを
      // 全部読み直して描き直してから、合成を再実行する。
      async function redrawOffCanvasFromScratch(){
        const snap = await strokesRef.once("value");
        const all = snap.val() || {};
        clearTransparent(s.offCtx, offCanvas);
        Object.values(all).forEach(stroke => {
          if(Number(stroke && stroke.clearVersion || 0) >= s.clearVersion){
            drawStroke(s.offCtx, stroke);
          }
        });
        queueComposite();
      }
      let redrawQueued = false;
      const onStrokeRemoved = () => {
        if(redrawQueued) return;
        redrawQueued = true;
        requestAnimationFrame(async () => { redrawQueued = false; await redrawOffCanvasFromScratch(); });
      };

      // 参加者情報・目隠し状態・clearVersionを先にまとめて確定させてから、
      // strokesのchild_addedリプレイを開始する（読み込み順序への依存をなくす）。
      (async () => {
        const [pidSnap, nameSnap, partSnap, hiddenSnap, cvSnap] = await Promise.all([
          participantIdRef.once("value"),
          nameRef.once("value"),
          partRef.once("value"),
          hiddenRef.once("value"),
          clearVersionRef.once("value")
        ]);
        if(cancelled) return;
        s.occupied = Boolean(pidSnap.val());
        s.name = nameSnap.val() || "";
        s.part = partSnap.val() || "";
        s.hidden = hiddenSnap.val() !== false;
        s.clearVersion = Number(cvSnap.val() || 0);
        updateStatus();
        queueComposite();

        participantIdRef.on("value",onParticipantId);
        nameRef.on("value",onName);
        partRef.on("value",onPart);
        hiddenRef.on("value",onHidden);
        strokesRef.on("child_added",onStroke);
        strokesRef.on("child_removed",onStrokeRemoved);
        clearVersionRef.on("value",onClearVersion);

        listeners.push(
          [participantIdRef,"value",onParticipantId],
          [nameRef,"value",onName],
          [partRef,"value",onPart],
          [hiddenRef,"value",onHidden],
          [strokesRef,"child_added",onStroke],
          [strokesRef,"child_removed",onStrokeRemoved],
          [clearVersionRef,"value",onClearVersion]
        );
      })();
    }

    synchro = { listeners, cancel(){ cancelled = true; } };
  }

  // ---- 共有キャンバスモード ----
  // 参加者全員が同じ1枚のキャンバス（drawingRooms/{room}/shared）に直接描き込む。
  // レイヤー合成ではなく、1本のcanvasにみんなのstrokeを順番に描き足していくだけ。
  function teardownShared(){
    if(!shared) return;
    for(const [ref,event,handler] of shared.listeners){
      ref.off(event,handler);
    }
    shared = null;
  }

  function renderShared(){
    grid.innerHTML = `<div class="synchro-wrap"><div class="synchro-canvas-shell"><canvas width="1080" height="1080"></canvas></div></div>`;
    grid.className = "obs-grid mode-synchro";

    const canvas = grid.querySelector(".synchro-canvas-shell canvas");
    const ctx = canvas.getContext("2d");
    clearTransparent(ctx, canvas);
    fitSquareShell();

    const base = db.ref(`drawingRooms/${room}/shared`);
    const strokesRef = base.child("strokes");
    const clearVersionRef = base.child("clearVersion");

    let clearVersion = 0;
    let drawQueue = [];
    let frameRequested = false;

    const flushDrawQueue = () => {
      frameRequested = false;
      const queue = drawQueue.splice(0);
      for(const stroke of queue){
        if(Number(stroke.clearVersion || 0) >= clearVersion){
          drawStroke(ctx, stroke);
        }
      }
    };

    const onStroke = snap => {
      const stroke = snap.val();
      if(!stroke) return;
      if(Number(stroke.clearVersion || 0) < clearVersion) return;
      drawQueue.push(stroke);
      if(!frameRequested){
        frameRequested = true;
        requestAnimationFrame(flushDrawQueue);
      }
    };

    const onClearVersion = snap => {
      const next = Number(snap.val() || 0);
      if(next !== clearVersion){
        clearVersion = next;
        drawQueue.length = 0;
        clearTransparent(ctx, canvas);
      }
    };

    // 誰かが線を「ひとつ戻る」等で削除した時は、1本だけ消すことができないので
    // 共有キャンバス全体を読み直して描き直す。
    async function redrawSharedFromScratch(){
      const snap = await strokesRef.once("value");
      const all = snap.val() || {};
      clearTransparent(ctx, canvas);
      Object.values(all).forEach(stroke => {
        if(Number(stroke && stroke.clearVersion || 0) >= clearVersion){
          drawStroke(ctx, stroke);
        }
      });
    }
    let redrawQueued = false;
    const onStrokeRemoved = () => {
      if(redrawQueued) return;
      redrawQueued = true;
      requestAnimationFrame(async () => { redrawQueued = false; await redrawSharedFromScratch(); });
    };

    let cancelled = false;
    (async () => {
      const cvSnap = await clearVersionRef.once("value");
      if(cancelled) return;
      clearVersion = Number(cvSnap.val() || 0);
      clearVersionRef.on("value",onClearVersion);
      strokesRef.on("child_added",onStroke);
      strokesRef.on("child_removed",onStrokeRemoved);
      shared.listeners.push(
        [clearVersionRef,"value",onClearVersion],
        [strokesRef,"child_added",onStroke],
        [strokesRef,"child_removed",onStrokeRemoved]
      );
    })();

    shared = { listeners: [], cancel(){ cancelled = true; } };
  }

  function applyMode(){
    if(mode === "synchro"){
      teardownGrid();
      teardownShared();
      renderSynchro();
    }else if(mode === "shared"){
      teardownGrid();
      teardownSynchro();
      renderShared();
    }else{
      teardownSynchro();
      teardownShared();
      renderLayout();
    }
  }

  db.ref(`drawingRooms/${room}/settings/layout`).on("value", snap => {
    const next = Number(snap.val());
    layout = [1,2,4,5].includes(next) ? next : 4;
    renderLayout();
  });

  db.ref(`drawingRooms/${room}/settings/focusSlot`).on("value", snap => {
    focusSlot = snap.val() || null;
    renderLayout();
  });

  db.ref(`drawingRooms/${room}/settings/mode`).on("value", snap => {
    const v = snap.val();
    mode = (v === "synchro" || v === "shared") ? v : "grid";
    applyMode();
  });

  db.ref(`drawingRooms/${room}/settings/showNames`).on("value", snap => {
    showNames = snap.val() !== false; // 未設定(null)ならデフォルトでON
    applyShowNames();
  });
})();
</script>
</body>
</html>
